name: Backend CI Quality Gates

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Module List
    runs-on: ubuntu-latest
    outputs:
      module_csv: ${{ steps.modules.outputs.module_csv }}
      module_count: ${{ steps.modules.outputs.module_count }}
      pom_list: ${{ steps.modules.outputs.pom_list }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: modules
        name: Discover Buildable Modules
        shell: bash
        run: |
          set -euo pipefail

          modules=("lms-common" "lms-gateway")
          poms=("lms-common/pom.xml" "lms-gateway/pom.xml")

          while IFS= read -r service_dir; do
            modules+=("${service_dir}")
            poms+=("${service_dir}/pom.xml")
          done < <(find services -mindepth 1 -maxdepth 1 -type d | sort)

          module_csv=$(IFS=, ; echo "${modules[*]}")

          {
            echo "module_csv=${module_csv}"
            echo "module_count=${#modules[@]}"
            echo "pom_list<<EOF"
            printf "%s\n" "${poms[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify with Coverage Profile
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -ntp -N -f pom.xml install
          mvn -B -ntp -f lms-common/pom.xml install -Pcoverage
          while IFS= read -r pom_file; do
            [ -z "${pom_file}" ] && continue
            [ "${pom_file}" = "lms-common/pom.xml" ] && continue
            echo "Verifying ${pom_file} with coverage profile"
            mvn -B -ntp -f "${pom_file}" verify -Pcoverage
          done <<< "${{ needs.prepare.outputs.pom_list }}"

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
            **/target/site/jacoco/**

  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run OWASP Dependency Check
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -ntp -N -f pom.xml install
          mvn -B -ntp -f lms-common/pom.xml install -Psecurity -DskipTests
          while IFS= read -r pom_file; do
            [ -z "${pom_file}" ] && continue
            [ "${pom_file}" = "lms-common/pom.xml" ] && continue
            echo "Running OWASP dependency check for ${pom_file}"
            mvn -B -ntp -f "${pom_file}" verify -Psecurity -DskipTests
          done <<< "${{ needs.prepare.outputs.pom_list }}"

      - name: Upload OWASP Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-reports
          path: |
            **/target/dependency-check-report.*

  sonar:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: [prepare, build_test]
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
    steps:
      - id: sonar_gate
        name: Check SonarCloud Secrets
        shell: bash
        run: |
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_PROJECT_KEY}" ] || [ -z "${SONAR_ORGANIZATION}" ]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping SonarCloud scan because required secrets are not configured."
          else
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.sonar_gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        if: steps.sonar_gate.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run SonarCloud Scan
        if: steps.sonar_gate.outputs.enabled == 'true'
        run: |
          mvn -B -ntp -N -f pom.xml install
          mvn -B -ntp -f lms-common/pom.xml verify -Pcoverage sonar:sonar \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.organization="${SONAR_ORGANIZATION}" \
            -Dsonar.host.url="https://sonarcloud.io" \
            -Dsonar.qualitygate.wait=true

  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    needs: prepare
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - id: snyk_gate
        name: Check Snyk Token
        shell: bash
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping Snyk scan because SNYK_TOKEN is not configured."
          else
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.snyk_gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up Java 17
        if: steps.snyk_gate.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Node.js
        if: steps.snyk_gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Snyk CLI
        if: steps.snyk_gate.outputs.enabled == 'true'
        run: npm install -g snyk@latest

      - name: Run Snyk on Maven Modules
        if: steps.snyk_gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r pom_file; do
            echo "Scanning ${pom_file}"
            snyk test --file="${pom_file}" --package-manager=maven --severity-threshold=high
          done <<< "${{ needs.prepare.outputs.pom_list }}"
