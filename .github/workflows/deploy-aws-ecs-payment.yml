name: Deploy LMS Payment Server to ECS Fargate

on:
  push:
    branches:
      - main
    paths:
      - 'services/lms-payment-service/**'
      - '.aws/ecs-task-def-payment.json'
      - '.github/workflows/deploy-aws-ecs-payment.yml'
      - 'lms-common/**'
  workflow_dispatch: # Manual trigger

env:
  AWS_REGION: us-east-1                  
  ECR_REPOSITORY: lms-payment-service          
  ECS_SERVICE: lms-payment-service       
  ECS_CLUSTER: lms-fargate-cluster    
  ECS_TASK_DEFINITION: .aws/ecs-task-def-payment.json 
  CONTAINER_NAME: lms-payment-service            

jobs:
  deploy:
    name: Deploy Payment Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Payment Service
        run: |
          mvn clean package -pl lms-common,services/lms-payment-service -am -DskipTests
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ecsTaskExecutionRole exists
        run: |
          aws iam get-role --role-name ecsTaskExecutionRole >/dev/null 2>&1 || \
          ( \
            echo "Role missing. Creating ecsTaskExecutionRole..." && \
            aws iam create-role \
              --role-name ecsTaskExecutionRole \
              --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"ecs-tasks.amazonaws.com"},"Action":"sts:AssumeRole"}]}' && \
            aws iam attach-role-policy \
              --role-name ecsTaskExecutionRole \
              --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy \
          )

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Create Base Infrastructure
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }}
          
          CLUSTER_STATUS=$(aws ecs describe-clusters --clusters ${{ env.ECS_CLUSTER }} --region ${{ env.AWS_REGION }} --query 'clusters[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
            aws ecs create-cluster --cluster-name ${{ env.ECS_CLUSTER }} --region ${{ env.AWS_REGION }}
          fi
          
          # Ensure cluster uses FARGATE_SPOT to save 70% cost
          aws ecs put-cluster-capacity-providers --cluster ${{ env.ECS_CLUSTER }} --capacity-providers FARGATE FARGATE_SPOT --default-capacity-provider-strategy capacityProvider=FARGATE_SPOT,weight=1 >/dev/null 2>&1 || true
          
          LOG_GROUP="/ecs/${{ env.CONTAINER_NAME }}"
          aws logs create-log-group --log-group-name $LOG_GROUP --region ${{ env.AWS_REGION }} >/dev/null 2>&1 || true
          aws logs put-retention-policy --log-group-name $LOG_GROUP --retention-in-days 7 --region ${{ env.AWS_REGION }} >/dev/null 2>&1 || true

      - name: Docker Build and Push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}/
          TAG: ${{ github.sha }}
        run: |
          image_name="${REGISTRY}${{ env.ECR_REPOSITORY }}:${TAG}"
          echo "Building $image_name"
          docker build -f services/lms-payment-service/Dockerfile \
            -t $image_name \
            --build-arg JAR_FILE="services/lms-payment-service/target/*.jar" \
            .
          docker push $image_name

      - name: Add Dynamic AWS Account ID into Task Def
        run: sed -i 's/448100672347/${{ secrets.AWS_ACCOUNT_ID }}/g' ${{ env.ECS_TASK_DEFINITION }}

      - name: Render task def
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          # COMPREHENSIVE INJECTION OF ENV VARS (IGNORED BY SERVICES THAT DON'T NEED THEM)
          environment-variables: |
            SPRING_PROFILES_ACTIVE=prod
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SPRING_REDIS_HOST=${{ vars.SPRING_REDIS_HOST }}
            SPRING_KAFKA_BOOTSTRAP_SERVERS=${{ vars.SPRING_KAFKA_BOOTSTRAP_SERVERS }}
            OTEL_EXPORTER_OTLP_ENDPOINT=${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
            SPRING_DATASOURCE_URL=${{ vars.SPRING_DATASOURCE_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            SPRING_DATASOURCE_REPLICA_URL=${{ vars.SPRING_DATASOURCE_REPLICA_URL }}
            ELASTICSEARCH_URIS=${{ vars.ELASTICSEARCH_URIS }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            LMS_STORAGE_BUCKET=${{ vars.LMS_STORAGE_BUCKET }}
            LMS_STORAGE_ENDPOINT=${{ vars.LMS_STORAGE_ENDPOINT }}
            LMS_STORAGE_PUBLIC_ENDPOINT=${{ vars.LMS_STORAGE_PUBLIC_ENDPOINT }}
            LMS_STORAGE_REGION=${{ vars.LMS_STORAGE_REGION }}
            LMS_STORAGE_ACCESS_KEY=${{ secrets.LMS_STORAGE_ACCESS_KEY }}
            LMS_STORAGE_SECRET_KEY=${{ secrets.LMS_STORAGE_SECRET_KEY }}
            USER_SERVICE_URL=${{ vars.USER_SERVICE_URL }}
            LMS_COURSE_SERVICE_URL=${{ vars.LMS_COURSE_SERVICE_URL }}
            LMS_ENROLLMENT_SERVICE_URL=${{ vars.LMS_ENROLLMENT_SERVICE_URL }}
            LMS_ASSIGNMENT_SERVICE_URL=${{ vars.LMS_ASSIGNMENT_SERVICE_URL }}

      - name: Auto-Create ECS Service if missing
        run: |
          SERVICE_STATUS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} --region ${{ env.AWS_REGION }} --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$SERVICE_STATUS" != "ACTIVE" ]; then
            VPC_ID=$(aws ec2 describe-vpcs --filters Name=isDefault,Values=true --region ${{ env.AWS_REGION }} --query 'Vpcs[0].VpcId' --output text)
            SUBNETS=$(aws ec2 describe-subnets --filters Name=vpc-id,Values=$VPC_ID --region ${{ env.AWS_REGION }} --query 'Subnets[*].SubnetId' --output text | tr '\t' ',')
            SG=$(aws ec2 describe-security-groups --filters Name=vpc-id,Values=$VPC_ID Name=group-name,Values=default --region ${{ env.AWS_REGION }} --query 'SecurityGroups[0].GroupId' --output text)
            
            TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://${{ steps.task-def.outputs.task-definition }} --region ${{ env.AWS_REGION }} --query 'taskDefinition.taskDefinitionArn' --output text)
            
            aws ecs create-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service-name ${{ env.ECS_SERVICE }} \
              --task-definition $TASK_DEF_ARN \
              --desired-count 1 \
              --capacity-provider-strategy capacityProvider=FARGATE_SPOT,weight=1 \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
              --region ${{ env.AWS_REGION }} >/dev/null
              
            sleep 20
          fi

      - name: Deploy Amazon ECS Task Definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
