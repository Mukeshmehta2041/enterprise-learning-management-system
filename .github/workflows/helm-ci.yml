name: Helm CI

on:
  pull_request:
    paths:
      - "infra/helm/**"
      - ".github/workflows/helm-ci.yml"
  push:
    branches:
      - main
    paths:
      - "infra/helm/**"
      - ".github/workflows/helm-ci.yml"

jobs:
  helm-validate:
    name: Helm Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint infra/helm/lms-backend

      - name: Render staging manifests
        run: |
          helm template lms-backend-staging infra/helm/lms-backend \
            -f infra/helm/lms-backend/values-staging.yaml \
            --set global.imageTag=ci-test > /tmp/staging.yaml

      - name: Render production manifests
        run: |
          helm template lms-backend-production infra/helm/lms-backend \
            -f infra/helm/lms-backend/values-production.yaml \
            --set global.imageTag=ci-test > /tmp/production.yaml
