name: Backend Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  quality_gate:
    name: Release Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify Backend Modules
        shell: bash
        run: |
          set -euo pipefail
          poms=("lms-common/pom.xml" "lms-gateway/pom.xml")
          while IFS= read -r service_dir; do
            poms+=("${service_dir}/pom.xml")
          done < <(find services -mindepth 1 -maxdepth 1 -type d | sort)

          mvn -B -ntp -N -f pom.xml install
          mvn -B -ntp -f lms-common/pom.xml install -Pcoverage,security

          for pom_file in "${poms[@]}"; do
            [ "${pom_file}" = "lms-common/pom.xml" ] && continue
            echo "Running coverage+security verification for ${pom_file}"
            mvn -B -ntp -f "${pom_file}" verify -Pcoverage,security
          done

  build_and_publish:
    name: Build and Publish Images
    runs-on: ubuntu-latest
    needs: quality_gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: lms-gateway
            dockerfile: lms-gateway/Dockerfile
            context: lms-gateway
            module_path: lms-gateway
          - service: lms-auth-service
            dockerfile: services/lms-auth-service/Dockerfile
            context: services/lms-auth-service
            module_path: services/lms-auth-service
          - service: lms-course-service
            dockerfile: services/lms-course-service/Dockerfile
            context: services/lms-course-service
            module_path: services/lms-course-service
          - service: lms-enrollment-service
            dockerfile: services/lms-enrollment-service/Dockerfile
            context: services/lms-enrollment-service
            module_path: services/lms-enrollment-service
          - service: lms-content-service
            dockerfile: services/lms-content-service/Dockerfile
            context: services/lms-content-service
            module_path: services/lms-content-service
          - service: lms-assignment-service
            dockerfile: services/lms-assignment-service/Dockerfile
            context: services/lms-assignment-service
            module_path: services/lms-assignment-service
          - service: lms-search-service
            dockerfile: services/lms-search-service/Dockerfile
            context: services/lms-search-service
            module_path: services/lms-search-service
          - service: lms-notification-service
            dockerfile: services/lms-notification-service/Dockerfile
            context: services/lms-notification-service
            module_path: services/lms-notification-service
          - service: lms-payment-service
            dockerfile: services/lms-payment-service/Dockerfile
            context: services/lms-payment-service
            module_path: services/lms-payment-service
          - service: lms-analytics-service
            dockerfile: services/lms-analytics-service/Dockerfile
            context: services/lms-analytics-service
            module_path: services/lms-analytics-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Module Artifact
        shell: bash
        run: |
          mvn -B -ntp -N -f pom.xml install
          if [ "${{ matrix.module_path }}" != "lms-common" ]; then
            mvn -B -ntp -f lms-common/pom.xml install -DskipTests
          fi
          mvn -B -ntp -f "${{ matrix.module_path }}/pom.xml" package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Image Name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/${{ matrix.service }}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=tag
            type=sha,format=short

      - name: Build and Push Image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image.outputs.image }}:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "${{ steps.image.outputs.image }}:${{ github.ref_name }}"
