name: Deploy Kubernetes via ArgoCD

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to deploy"
        required: true
        default: "latest"

permissions:
  contents: read

jobs:
  helm_validate:
    name: Helm Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm Chart
        run: |
          helm lint infra/helm/lms-backend

      - name: Render Staging Manifests
        run: |
          helm template lms-backend-staging infra/helm/lms-backend \
            -f infra/helm/lms-backend/values-staging.yaml \
            --set global.imageTag="${{ github.event.inputs.image_tag || github.ref_name }}" > /tmp/staging-rendered.yaml

      - name: Render Production Manifests
        run: |
          helm template lms-backend-prod infra/helm/lms-backend \
            -f infra/helm/lms-backend/values-production.yaml \
            --set global.imageTag="${{ github.event.inputs.image_tag || github.ref_name }}" > /tmp/prod-rendered.yaml

      - name: Upload Rendered Manifests
        uses: actions/upload-artifact@v4
        with:
          name: helm-rendered-manifests
          path: |
            /tmp/staging-rendered.yaml
            /tmp/prod-rendered.yaml

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: helm_validate
    env:
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      ARGOCD_APP_STAGING: ${{ secrets.ARGOCD_APP_STAGING }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}
    steps:
      - name: Validate ArgoCD Staging Configuration
        shell: bash
        run: |
          if [ -z "${ARGOCD_SERVER}" ] || [ -z "${ARGOCD_AUTH_TOKEN}" ] || [ -z "${ARGOCD_APP_STAGING}" ]; then
            echo "Missing one or more required secrets: ARGOCD_SERVER, ARGOCD_AUTH_TOKEN, ARGOCD_APP_STAGING"
            exit 1
          fi

      - name: Install ArgoCD CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/argocd "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64"
          sudo install -m 555 /tmp/argocd /usr/local/bin/argocd

      - name: Install jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Sync Staging Application
        shell: bash
        run: |
          set -euo pipefail
          argocd app set "${ARGOCD_APP_STAGING}" --helm-set "global.imageTag=${IMAGE_TAG}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}"
          argocd app sync "${ARGOCD_APP_STAGING}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" --timeout 600
          argocd app wait "${ARGOCD_APP_STAGING}" --health --sync --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" --timeout 600

      - name: Verify Staging Rollout State
        shell: bash
        run: |
          set -euo pipefail
          app_json=$(argocd app get "${ARGOCD_APP_STAGING}" --refresh --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" -o json)
          sync_status=$(echo "${app_json}" | jq -r '.status.sync.status')
          health_status=$(echo "${app_json}" | jq -r '.status.health.status')

          echo "Staging sync status: ${sync_status}"
          echo "Staging health status: ${health_status}"

          if [ "${sync_status}" != "Synced" ] || [ "${health_status}" != "Healthy" ]; then
            echo "::error::Staging rollout verification failed"
            exit 1
          fi

      - name: Staging Diagnostics On Failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          argocd app get "${ARGOCD_APP_STAGING}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" || true
          argocd app resources "${ARGOCD_APP_STAGING}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" || true
          argocd app history "${ARGOCD_APP_STAGING}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" || true

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [helm_validate, deploy_staging]
    env:
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      ARGOCD_APP_PRODUCTION: ${{ secrets.ARGOCD_APP_PRODUCTION }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}
    steps:
      - name: Validate ArgoCD Production Configuration
        shell: bash
        run: |
          if [ -z "${ARGOCD_SERVER}" ] || [ -z "${ARGOCD_AUTH_TOKEN}" ] || [ -z "${ARGOCD_APP_PRODUCTION}" ]; then
            echo "Missing one or more required secrets: ARGOCD_SERVER, ARGOCD_AUTH_TOKEN, ARGOCD_APP_PRODUCTION"
            exit 1
          fi

      - name: Install ArgoCD CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/argocd "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64"
          sudo install -m 555 /tmp/argocd /usr/local/bin/argocd

      - name: Install jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Sync Production Application
        id: prod_sync
        shell: bash
        run: |
          set -euo pipefail
          argocd app set "${ARGOCD_APP_PRODUCTION}" --helm-set "global.imageTag=${IMAGE_TAG}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}"
          argocd app sync "${ARGOCD_APP_PRODUCTION}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" --timeout 900
          argocd app wait "${ARGOCD_APP_PRODUCTION}" --health --sync --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" --timeout 900
          echo "deployment_timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Verify Production Rollout State
        shell: bash
        run: |
          set -euo pipefail
          app_json=$(argocd app get "${ARGOCD_APP_PRODUCTION}" --refresh --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" -o json)
          sync_status=$(echo "${app_json}" | jq -r '.status.sync.status')
          health_status=$(echo "${app_json}" | jq -r '.status.health.status')

          echo "Production sync status: ${sync_status}"
          echo "Production health status: ${health_status}"

          if [ "${sync_status}" != "Synced" ] || [ "${health_status}" != "Healthy" ]; then
            echo "::error::Production rollout verification failed"
            exit 1
          fi

      - name: Production Diagnostics On Failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          argocd app get "${ARGOCD_APP_PRODUCTION}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" || true
          argocd app resources "${ARGOCD_APP_PRODUCTION}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" || true
          argocd app history "${ARGOCD_APP_PRODUCTION}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" || true

  health_check:
    name: Post-Deployment Health & SLO Gate
    runs-on: ubuntu-latest
    needs: deploy_production
    timeout-minutes: 15
    env:
      KUBECONFIG: /tmp/kubeconfig
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      ARGOCD_APP_PRODUCTION: ${{ secrets.ARGOCD_APP_PRODUCTION }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Health Check Configuration
        shell: bash
        run: |
          if [ -z "${ARGOCD_SERVER}" ] || [ -z "${ARGOCD_AUTH_TOKEN}" ] || [ -z "${ARGOCD_APP_PRODUCTION}" ]; then
            echo "Missing required secrets for health check"
            exit 1
          fi

      - name: Install ArgoCD CLI & kubectl
        shell: bash
        run: |
          set -euo pipefail
          # Install ArgoCD CLI
          curl -sSL -o /tmp/argocd "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64"
          sudo install -m 555 /tmp/argocd /usr/local/bin/argocd
          # Install kubectl
          curl -sSL -o /tmp/kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 555 /tmp/kubectl /usr/local/bin/kubectl

      - name: Retrieve Kubeconfig from ArgoCD
        shell: bash
        run: |
          set -euo pipefail
          argocd cluster info --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" > /tmp/cluster-info.txt || true
          # For local/in-cluster: assume kubeconfig is available via KUBECONFIG env or create a minimal one
          echo "Cluster info retrieved; proceeding with health checks"

      - name: Check Pod Health Status
        id: pod_health
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking pod readiness in lms-production namespace..."

          # Wait for pods to be ready (up to 120 seconds)
          timeout 120 kubectl rollout status deployment -n lms-production --all || {
            echo "::warning::Pod rollout status check timed out or failed. Gathering diagnostics..."
            kubectl get pods -n lms-production -o wide
            exit 1
          }

          # Verify all critical services have at least 1 ready replica
          critical_services=("lms-gateway" "lms-auth-service" "lms-course-service" "lms-enrollment-service")
          for service in "${critical_services[@]}"; do
            ready_replicas=$(kubectl get deployment "${service}" -n lms-production -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            desired_replicas=$(kubectl get deployment "${service}" -n lms-production -o jsonpath='{.status.replicas}' 2>/dev/null || echo "0")
            if [ "${ready_replicas}" -lt 1 ]; then
              echo "::error::Service ${service} has 0 ready replicas (desired: ${desired_replicas})"
              exit 1
            fi
            echo "✓ ${service}: ${ready_replicas}/${desired_replicas} replicas ready"
          done

          echo "pod_health_status=healthy" >> "${GITHUB_OUTPUT}"

      - name: Check Endpoint Connectivity
        id: endpoint_check
        shell: bash
        run: |
          set -euo pipefail
          echo "Validating service endpoints..."

          # Check that services have endpoints
          services=("lms-gateway" "lms-auth-service" "lms-course-service" "lms-enrollment-service")
          for svc in "${services[@]}"; do
            endpoints=$(kubectl get endpoints "${svc}" -n lms-production -o jsonpath='{.subsets[*].addresses[*].ip}' 2>/dev/null | wc -w)
            if [ "${endpoints}" -lt 1 ]; then
              echo "::warning::Service ${svc} has no endpoints"
            else
              echo "✓ ${svc}: ${endpoints} endpoint(s) available"
            fi
          done

          echo "endpoint_status=validated" >> "${GITHUB_OUTPUT}"

      - name: Verify Service Probes
        id: probe_check
        shell: bash
        run: |
          set -euo pipefail
          echo "Verifying readiness/liveness probe responses..."

          # Get a gateway pod and check its actuator health endpoint
          gateway_pod=$(kubectl get pod -n lms-production -l app.kubernetes.io/name=lms-gateway -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -z "${gateway_pod}" ]; then
            echo "::warning::No gateway pod found for health probe verification"
          else
            # Port-forward and test health endpoint
            kubectl port-forward -n lms-production "pod/${gateway_pod}" 8080:8080 &
            sleep 3
            
            health_response=$(curl -s -w "\n%{http_code}" http://localhost:8080/actuator/health 2>/dev/null || echo "000")
            http_code=$(echo "${health_response}" | tail -n 1)
            
            if [ "${http_code}" = "200" ]; then
              echo "✓ Gateway health probe returned 200 OK"
              echo "probe_status=healthy" >> "${GITHUB_OUTPUT}"
            else
              echo "::warning::Gateway health probe returned ${http_code} (expected 200)"
              echo "probe_status=warning" >> "${GITHUB_OUTPUT}"
            fi
            
            pkill -f "kubectl port-forward" || true
          fi

      - name: Check SLO Thresholds
        id: slo_check
        shell: bash
        run: |
          set -euo pipefail
          echo "Validating SLO metrics thresholds..."

          # Check pod restart count (should be 0 for healthy deployment)
          max_restarts=2
          restarting_pods=$(kubectl get pods -n lms-production -o jsonpath='{range .items[*]}{.metadata.name}{"  "}{.status.containerStatuses[*].restartCount}{"\n"}{end}' 2>/dev/null | awk -v max="${max_restarts}" '$NF > max {print $0}' | wc -l || echo "0")

          if [ "${restarting_pods}" -gt 0 ]; then
            echo "::warning::${restarting_pods} pod(s) have exceeded restart threshold (max: ${max_restarts})"
            kubectl get pods -n lms-production -o jsonpath='{range .items[*]}{.metadata.name}{"  "}{.status.containerStatuses[*].restartCount}{"\n"}{end}'
          else
            echo "✓ Pod restart count within SLO threshold"
          fi

          # Check for pods in CrashLoopBackOff
          crash_pods=$(kubectl get pods -n lms-production -o jsonpath='{range .items[?(@.status.containerStatuses[*].state.waiting.reason=="CrashLoopBackOff")]}{.metadata.name}{"\n"}{end}' 2>/dev/null | wc -l || echo "0")

          if [ "${crash_pods}" -gt 0 ]; then
            echo "::error::${crash_pods} pod(s) in CrashLoopBackOff state"
            exit 1
          fi

          echo "✓ No pods in CrashLoopBackOff"
          echo "slo_status=pass" >> "${GITHUB_OUTPUT}"

      - name: Collect Deployment Diagnostics
        if: failure() || cancelled()
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Deployment Diagnostics ==="
          echo "Pod Status:"
          kubectl get pods -n lms-production -o wide || true
          echo ""
          echo "Deployment Status:"
          kubectl get deployments -n lms-production -o wide || true
          echo ""
          echo "Events (last 20):"
          kubectl get events -n lms-production --sort-by='.lastTimestamp' | tail -20 || true
          echo ""
          echo "Pod Logs (lms-gateway):"
          kubectl logs -n lms-production -l app.kubernetes.io/name=lms-gateway --tail=50 --all-containers=true 2>/dev/null | head -50 || true

  smoke_tests:
    name: Post-Deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: health_check
    timeout-minutes: 10
    env:
      GATEWAY_URL: "http://lms-gateway.lms-production.svc.cluster.local:8080"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install kubectl
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 555 /tmp/kubectl /usr/local/bin/kubectl

      - name: Install bc
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bc

      - name: Setup Port Forwarding
        shell: bash
        run: |
          set -euo pipefail
          # Port-forward gateway service
          kubectl port-forward -n lms-production svc/lms-gateway 8080:8080 &
          PF_PID=$!
          sleep 3
          echo "PF_PID=$PF_PID" >> $GITHUB_ENV

      - name: Test Critical Path - Auth Endpoint
        shell: bash
        run: |
          set -euo pipefail
          echo "Testing auth service /health endpoint..."
          response=$(curl -s -w "\n%{http_code}" http://localhost:8080/actuator/health/live 2>/dev/null || echo "fail\n000")
          http_code=$(echo "$response" | tail -n 1)

          if [ "$http_code" = "200" ]; then
            echo "✓ Auth health check: HTTP 200 OK"
          else
            echo "✗ Auth health check failed: HTTP $http_code"
            exit 1
          fi

      - name: Test API Contract - Course Service
        shell: bash
        run: |
          set -euo pipefail
          echo "Testing course service contract..."

          # Test course list endpoint (no auth required for health check)
          response=$(curl -s -w "\n%{http_code}" http://localhost:8080/api/v1/courses/health 2>/dev/null || echo "fail\n000")
          http_code=$(echo "$response" | tail -n 1)

          if [ "$http_code" = "200" ] || [ "$http_code" = "404" ]; then
            echo "✓ Course service responding: HTTP $http_code"
          else
            echo "✗ Course service unresponsive: HTTP $http_code"
            exit 1
          fi

      - name: Test Critical Transaction - Mock Enrollment Flow
        shell: bash
        run: |
          set -euo pipefail
          echo "Testing critical transaction path..."

          # Simulate enrollment service readiness with health endpoint
          response=$(curl -s -w "\n%{http_code}" http://localhost:8080/api/v1/enrollments/health 2>/dev/null || echo "fail\n000")
          http_code=$(echo "$response" | tail -n 1)

          if [ "$http_code" = "200" ] || [ "$http_code" = "404" ]; then
            echo "✓ Enrollment service responding: HTTP $http_code"
          else
            echo "✗ Transaction path broken - enrollment service failed: HTTP $http_code"
            exit 1
          fi

      - name: Test Error Rate Baseline
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking error rate baseline..."

          # Run 20 requests and check for excessive errors
          total=20
          errors=0
          for i in $(seq 1 $total); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health 2>/dev/null || echo "000")
            if [[ ! "$status" =~ ^2 ]]; then
              ((errors++))
            fi
            sleep 0.1
          done

          error_rate=$(echo "scale=4; $errors / $total * 100" | bc)
          threshold=5.0

          echo "Error rate: $error_rate% (threshold: $threshold%)"
          if (( $(echo "$error_rate > $threshold" | bc -l) )); then
            echo "✗ Error rate exceeds threshold"
            exit 1
          else
            echo "✓ Error rate within acceptable range"
          fi

      - name: Cleanup Port Forward
        if: always()
        shell: bash
        run: |
          pkill -f "kubectl port-forward" || true

      - name: Report Smoke Test Results
        if: success()
        shell: bash
        run: |
          echo "::notice::All smoke tests passed - critical path validated"

  slo_metrics_gate:
    name: Prometheus SLO Validation
    runs-on: ubuntu-latest
    needs: health_check
    timeout-minutes: 5
    env:
      PROMETHEUS_URL: ${{ secrets.PROMETHEUS_URL }}
      PROMETHEUS_TOKEN: ${{ secrets.PROMETHEUS_TOKEN }}
    steps:
      - name: Check Prometheus Configuration
        id: prom_check
        shell: bash
        run: |
          if [ -z "${PROMETHEUS_URL}" ] || [ -z "${PROMETHEUS_TOKEN}" ]; then
            echo "::warning::Prometheus credentials not configured - skipping metrics validation"
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "enabled=true" >> "${GITHUB_OUTPUT}"

      - name: Install bc
        if: steps.prom_check.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bc

      - name: Query Error Rate SLO
        if: steps.prom_check.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Validating error rate SLO (target: < 0.5%)..."

          # PromQL: 5min error rate across all services
          query='sum(rate(http_requests_total{job=~"lms-.*",status=~"5.."}[5m])) / sum(rate(http_requests_total{job=~"lms-.*"}[5m])) * 100'

          response=$(curl -s -H "Authorization: Bearer ${PROMETHEUS_TOKEN}" \
            "${PROMETHEUS_URL}/api/v1/query" \
            --data-urlencode "query=${query}" 2>/dev/null || echo '{}')

          error_rate=$(echo "$response" | grep -o '"value":\[[0-9]*,"[0-9.]*"' | grep -o '[0-9.]*"$' | tr -d '"' || echo "0")

          echo "Current error rate: ${error_rate}%"
          if (( $(echo "${error_rate} > 0.5" | bc -l) )); then
            echo "::warning::Error rate exceeds SLO threshold of 0.5%"
          else
            echo "✓ Error rate within SLO"
          fi

      - name: Query Latency SLO (p95)
        if: steps.prom_check.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Validating p95 latency SLO (target: < 500ms)..."

          # PromQL: p95 latency across gateway
          query='histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="lms-gateway"}[5m])) by (le)) * 1000'

          response=$(curl -s -H "Authorization: Bearer ${PROMETHEUS_TOKEN}" \
            "${PROMETHEUS_URL}/api/v1/query" \
            --data-urlencode "query=${query}" 2>/dev/null || echo '{}')

          latency_p95=$(echo "$response" | grep -o '"value":\[[0-9]*,"[0-9.]*"' | grep -o '[0-9.]*"$' | tr -d '"' || echo "0")

          echo "Current p95 latency: ${latency_p95}ms"
          if (( $(echo "${latency_p95} > 500" | bc -l) )); then
            echo "::warning::P95 latency exceeds SLO threshold of 500ms"
          else
            echo "✓ P95 latency within SLO"
          fi

      - name: Query Request Volume Baseline
        if: steps.prom_check.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking request volume baseline..."

          # PromQL: RPS baseline
          query='sum(rate(http_requests_total{job=~"lms-.*"}[1m]))'

          response=$(curl -s -H "Authorization: Bearer ${PROMETHEUS_TOKEN}" \
            "${PROMETHEUS_URL}/api/v1/query" \
            --data-urlencode "query=${query}" 2>/dev/null || echo '{}')

          rps=$(echo "$response" | grep -o '"value":\[[0-9]*,"[0-9.]*"' | grep -o '[0-9.]*"$' | tr -d '"' || echo "0")

          echo "Current RPS: ${rps}"
          if (( $(echo "${rps} > 0" | bc -l) )); then
            echo "✓ Request volume baseline established"
          else
            echo "::warning::No request volume detected yet (normal for new deployment)"
          fi

      - name: SLO Gate Decision
        if: steps.prom_check.outputs.enabled == 'true'
        shell: bash
        run: |
          echo "::notice::SLO metrics validated - deployment meets baseline thresholds"

      - name: Skip Metrics (Not Configured)
        if: steps.prom_check.outputs.enabled == 'false'
        shell: bash
        run: |
          echo "::notice::Prometheus not configured - skipping metrics validation (Phase 4 optional)"

  deployment_approval:
    name: Production Deployment Approval Gate
    runs-on: ubuntu-latest
    needs: [health_check, smoke_tests, slo_metrics_gate]
    if: success()
    environment:
      name: production-deployment
      url: https://github.com/argoproj/argo-cd
    steps:
      - name: Request Production Approval
        shell: bash
        run: |
          echo "::notice::All health & smoke tests completed successfully"
          echo "::notice::Ready for production deployment approval"
          echo "Deployment timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Environment: production"
          echo "Awaiting manual approval gate..."

  automatic_rollback:
    name: Automatic Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy_production, health_check, smoke_tests, slo_metrics_gate]
    if: (needs.health_check.result == 'failure' || needs.smoke_tests.result == 'failure' || needs.slo_metrics_gate.result == 'failure') && needs.deploy_production.result == 'success'
    env:
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      ARGOCD_APP_PRODUCTION: ${{ secrets.ARGOCD_APP_PRODUCTION }}
    steps:
      - name: Validate Rollback Configuration
        shell: bash
        run: |
          if [ -z "${ARGOCD_SERVER}" ] || [ -z "${ARGOCD_AUTH_TOKEN}" ] || [ -z "${ARGOCD_APP_PRODUCTION}" ]; then
            echo "Missing required secrets for rollback"
            exit 1
          fi

      - name: Install ArgoCD CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/argocd "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64"
          sudo install -m 555 /tmp/argocd /usr/local/bin/argocd

      - name: Trigger Production Rollback
        shell: bash
        run: |
          set -euo pipefail
          echo "::error::Health check failed, triggering automatic rollback to previous stable version"

          # Get current app history
          app_history=$(argocd app history "${ARGOCD_APP_PRODUCTION}" --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" 2>/dev/null || echo "")

          # Rollback to previous revision (index 1)
          echo "Reverting to previous stable revision..."
          argocd app rollback "${ARGOCD_APP_PRODUCTION}" 1 --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}"

          # Wait for rollback to complete
          argocd app wait "${ARGOCD_APP_PRODUCTION}" --health --sync --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" --timeout 600

          echo "Rollback completed successfully"

      - name: Post-Rollback Verification
        shell: bash
        run: |
          set -euo pipefail
          # Verify rollback completed
          app_status=$(argocd app get "${ARGOCD_APP_PRODUCTION}" --refresh --grpc-web --auth-token "${ARGOCD_AUTH_TOKEN}" --server "${ARGOCD_SERVER}" -o json 2>/dev/null | grep -o '"health":{"status":"[^"]*"' | cut -d'"' -f4 || echo "Unknown")
          echo "Post-rollback application health status: ${app_status}"

      - name: Notify Rollback Event
        shell: bash
        run: |
          echo "::notice::Production rollback completed. Review logs for failure details."
