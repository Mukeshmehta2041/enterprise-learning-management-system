name: Deploy LMS Gateway to Amazon ECS Fargate

on:
  workflow_dispatch: # Manual trigger for testing initial deployment safely

env:
  AWS_REGION: us-east-1                  
  ECR_REPOSITORY: lms-gateway          
  ECS_SERVICE: lms-gateway-service       
  ECS_CLUSTER: lms-fargate-cluster    
  ECS_TASK_DEFINITION: .aws/ecs-task-def-gateway.json 
  CONTAINER_NAME: lms-gateway            

jobs:
  deploy:
    name: Deploy Gateway to ECS Fargate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Gateway Service (Optimized for 1 Service)
        # Because this is a test dispatch for 1 service, we build ONLY the gateway.
        # This saves massive runner minutes and executes much faster.
        run: |
          mvn clean package -pl lms-common,lms-gateway -am -DskipTests
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Inject AWS Account ID into Task Definition
        run: |
          sed -i 's/448100672347/${{ secrets.AWS_ACCOUNT_ID }}/g' .aws/ecs-task-def-gateway.json
          # If the secret isn't set, it stays as is, or we could just use the id directly.
          # Since the user explicitly asked to take it from secrets, we'll assume the secret is set.
      - name: Ensure ecsTaskExecutionRole exists
        run: |
          # Fargate tasks must have this specific IAM role to pull from ECR and send logs to CloudWatch
          aws iam get-role --role-name ecsTaskExecutionRole >/dev/null 2>&1 || \
          ( \
            echo "Role missing. Creating ecsTaskExecutionRole..." && \
            aws iam create-role \
              --role-name ecsTaskExecutionRole \
              --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"ecs-tasks.amazonaws.com"},"Action":"sts:AssumeRole"}]}' && \
            aws iam attach-role-policy \
              --role-name ecsTaskExecutionRole \
              --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy \
          )

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Create ECR Repository and ECS Cluster if missing
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }}
          
          CLUSTER_STATUS=$(aws ecs describe-clusters --clusters ${{ env.ECS_CLUSTER }} --region ${{ env.AWS_REGION }} --query 'clusters[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
            echo "Creating missing ECS cluster..."
            aws ecs create-cluster --cluster-name ${{ env.ECS_CLUSTER }} --region ${{ env.AWS_REGION }}
          fi

      - name: Docker Build and Push (Gateway only)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}/
          TAG: ${{ github.sha }}

        run: |
          image_name="${REGISTRY}${ECR_REPOSITORY}:${TAG}"
          echo "Building $image_name"
          docker build -f lms-gateway/Dockerfile \
            -t $image_name \
            --build-arg JAR_FILE="lms-gateway/target/*.jar" \
            .
            
          echo "Pushing $image_name to Amazon ECR"
          docker push $image_name

      - name: Render new image ID into Amazon ECS Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Auto-Create ECS Service if missing
        run: |
          SERVICE_STATUS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} --region ${{ env.AWS_REGION }} --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$SERVICE_STATUS" != "ACTIVE" ]; then
            echo "Service missing. Finding Default VPC network details..."
            VPC_ID=$(aws ec2 describe-vpcs --filters Name=isDefault,Values=true --region ${{ env.AWS_REGION }} --query 'Vpcs[0].VpcId' --output text)
            if [ "$VPC_ID" == "None" ] || [ -z "$VPC_ID" ]; then
              echo "Error: No default VPC found. AWS Fargate requires a VPC."
              exit 1
            fi
            
            SUBNETS=$(aws ec2 describe-subnets --filters Name=vpc-id,Values=$VPC_ID --region ${{ env.AWS_REGION }} --query 'Subnets[*].SubnetId' --output text | tr '\t' ',')
            SG=$(aws ec2 describe-security-groups --filters Name=vpc-id,Values=$VPC_ID Name=group-name,Values=default --region ${{ env.AWS_REGION }} --query 'SecurityGroups[0].GroupId' --output text)
            
            echo "Registering initial Task Definition..."
            TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://${{ steps.task-def.outputs.task-definition }} --region ${{ env.AWS_REGION }} --query 'taskDefinition.taskDefinitionArn' --output text)
            
            echo "Creating Fargate Service on VPC $VPC_ID..."
            aws ecs create-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service-name ${{ env.ECS_SERVICE }} \
              --task-definition $TASK_DEF_ARN \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
              --region ${{ env.AWS_REGION }} >/dev/null
              
            echo "Waiting 20s for service to initialize..."
            sleep 20
          fi

      - name: Deploy Amazon ECS Task Definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
