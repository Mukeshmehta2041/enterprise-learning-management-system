name: CodeQL

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "30 2 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["java"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build for CodeQL
        shell: bash
        run: |
          set -euo pipefail
          poms=("lms-common/pom.xml" "lms-gateway/pom.xml")
          while IFS= read -r service_dir; do
            poms+=("${service_dir}/pom.xml")
          done < <(find services -mindepth 1 -maxdepth 1 -type d | sort)

          mvn -B -ntp -f lms-common/pom.xml install -DskipTests

          for pom_file in "${poms[@]}"; do
            [ "${pom_file}" = "lms-common/pom.xml" ] && continue
            echo "Compiling ${pom_file}"
            mvn -B -ntp -f "${pom_file}" compile -DskipTests
          done

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
