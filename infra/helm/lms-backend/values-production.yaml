global:
  imageTag: latest
  imagePullSecrets:
    - name: ghcr-secret

ingress:
  enabled: true
  className: nginx
  host: api.lms.example.com
  tls:
    enabled: true
    secretName: lms-production-tls

config:
  SPRING_PROFILES_ACTIVE: k8s-prod
  CORS_ALLOWED_ORIGINS: https://app.lms.example.com

externalSecrets:
  enabled: true
  secretStoreRef:
    name: lms-production-secret-store
    kind: ClusterSecretStore
  data:
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteKey: /lms/production/common
      property: SPRING_DATASOURCE_USERNAME
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteKey: /lms/production/common
      property: SPRING_DATASOURCE_PASSWORD
    - secretKey: JWT_SECRET
      remoteKey: /lms/production/common
      property: JWT_SECRET
    - secretKey: LMS_STORAGE_ACCESS_KEY
      remoteKey: /lms/production/common
      property: LMS_STORAGE_ACCESS_KEY
    - secretKey: LMS_STORAGE_SECRET_KEY
      remoteKey: /lms/production/common
      property: LMS_STORAGE_SECRET_KEY
    - secretKey: MAILTRAP_USERNAME
      remoteKey: /lms/production/common
      property: MAILTRAP_USERNAME
    - secretKey: MAILTRAP_PASSWORD
      remoteKey: /lms/production/common
      property: MAILTRAP_PASSWORD

secrets:
  SPRING_DATASOURCE_USERNAME: lmsuser
  SPRING_DATASOURCE_PASSWORD: postgres-secure-password-prod-2026
  JWT_SECRET: production-jwt-secret-change-me
  LMS_STORAGE_ACCESS_KEY: minioadmin
  LMS_STORAGE_SECRET_KEY: minioadmin
  MAILTRAP_USERNAME: ""
  MAILTRAP_PASSWORD: ""

dependencies:
  postgres:
    dbName: lms_db_prod
    username: lmsuser
    password: postgres-secure-password-prod-2026
    storageSize: 50Gi
    storageClassName: do-block-storage
  redis:
    storageSize: 10Gi
    storageClassName: do-block-storage
  kafka:
    storageSize: 20Gi
    storageClassName: do-block-storage
  elasticsearch:
    storageSize: 50Gi
    storageClassName: do-block-storage
  minio:
    storageSize: 50Gi
    storageClassName: do-block-storage

components:
  lms-gateway:
    replicaCount: 4
    resources:
      requests:
        cpu: 300m
        memory: 384Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    hpa:
      minReplicas: 4
      maxReplicas: 12
  lms-auth-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-course-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-enrollment-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-content-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-assignment-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-search-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-notification-service:
    replicaCount: 2
    hpa:
      minReplicas: 2
      maxReplicas: 8
  lms-payment-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-analytics-service:
    replicaCount: 2
    hpa:
      minReplicas: 2
      maxReplicas: 8

frontend:
  enabled: true
  ingress:
    enabled: true
    className: nginx
    host: app.lms.example.com
    tls:
      enabled: true
      secretName: lms-frontend-production-tls
