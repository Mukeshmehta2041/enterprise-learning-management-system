global:
  imageTag: latest
  # Image pull credentials for DigitalOcean Kubernetes
  imagePullSecrets:
    - name: ghcr-secret
  # Storage configuration for DigitalOcean Block Storage
  persistence:
    enabled: true
    storageClassName: do-block-storage
    size: 50Gi

components:
  lms-gateway:
    replicaCount: 4
    resources:
      requests:
        cpu: 300m
        memory: 384Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    hpa:
      minReplicas: 4
      maxReplicas: 12
  lms-auth-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-course-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-enrollment-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-content-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-assignment-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-search-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-notification-service:
    replicaCount: 2
    hpa:
      minReplicas: 2
      maxReplicas: 8
  lms-payment-service:
    replicaCount: 3
    hpa:
      minReplicas: 3
      maxReplicas: 10
  lms-analytics-service:
    replicaCount: 2
    hpa:
      minReplicas: 2
      maxReplicas: 8

# Database and Cache Configuration
database:
  host: postgres
  port: 5432
  name: lms_db_prod
  username: lmsuser
  password: "postgres-secure-password-prod-2026"

redis:
  host: redis
  port: 6379
  password: "redis-secure-password-prod-2026"

# Common environment variables for all services
commonEnv:
  - name: SPRING_PROFILE_ACTIVE
    value: "k8s-prod"
  - name: SPRING_DATASOURCE_URL
    value: "jdbc:postgresql://postgres:5432/lms_db_prod"
  - name: SPRING_DATASOURCE_USERNAME
    value: "lmsuser"
  - name: SPRING_DATASOURCE_PASSWORD
    value: "postgres-secure-password-prod-2026"
  - name: SPRING_REDIS_HOST
    value: "redis"
  - name: SPRING_REDIS_PORT
    value: "6379"
  - name: SPRING_REDIS_PASSWORD
    value: "redis-secure-password-prod-2026"
  - name: JWT_SECRET_KEY
    value: "your-production-super-secret-jwt-key-at-least-256-bits-long-for-security"
  - name: JAVA_OPTS
    value: "-Xmx1g -Xms512m"

