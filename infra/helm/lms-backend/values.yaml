global:
  imageRegistry: ghcr.io/your-org
  imageTag: latest
  imagePullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}
  name: ""

components:
  lms-gateway:
    enabled: true
    imageName: lms-gateway
    containerPort: 8080
    servicePort: 80
    replicaCount: 2
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      minAvailable: 1

