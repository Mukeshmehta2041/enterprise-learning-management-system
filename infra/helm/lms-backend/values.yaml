global:
  imageRegistry: ghcr.io/mukeshmehta2041
  imageTag: latest
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: ghcr-secret

serviceAccount:
  create: true
  annotations: {}
  name: ""

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: lms.local
  tls:
    enabled: false
    secretName: ""

config:
  SPRING_PROFILES_ACTIVE: k8s
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  SPRING_REDIS_HOST: redis
  SPRING_REDIS_PORT: "6379"
  SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
  LMS_STORAGE_ENDPOINT: http://minio:9000
  CORS_ALLOWED_ORIGINS: http://localhost:3001

secrets:
  SPRING_DATASOURCE_USERNAME: lms
  SPRING_DATASOURCE_PASSWORD: lms
  JWT_SECRET: change-me
  LMS_STORAGE_ACCESS_KEY: minioadmin
  LMS_STORAGE_SECRET_KEY: minioadmin
  MAILTRAP_USERNAME: ""
  MAILTRAP_PASSWORD: ""

externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: lms-cluster-secret-store
    kind: ClusterSecretStore
  data:
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteKey: /lms/common
      property: SPRING_DATASOURCE_USERNAME
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteKey: /lms/common
      property: SPRING_DATASOURCE_PASSWORD
    - secretKey: JWT_SECRET
      remoteKey: /lms/common
      property: JWT_SECRET
    - secretKey: LMS_STORAGE_ACCESS_KEY
      remoteKey: /lms/common
      property: LMS_STORAGE_ACCESS_KEY
    - secretKey: LMS_STORAGE_SECRET_KEY
      remoteKey: /lms/common
      property: LMS_STORAGE_SECRET_KEY
    - secretKey: MAILTRAP_USERNAME
      remoteKey: /lms/common
      property: MAILTRAP_USERNAME
    - secretKey: MAILTRAP_PASSWORD
      remoteKey: /lms/common
      property: MAILTRAP_PASSWORD

frontend:
  enabled: false
  imageName: lms-frontend
  imageTag: ""
  replicaCount: 2
  containerPort: 80
  servicePort: 80
  serviceType: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  ingress:
    enabled: false
    className: nginx
    host: app.lms.local
    tls:
      enabled: false
      secretName: ""

dependencies:
  postgres:
    enabled: true
    image: postgres:16-alpine
    servicePort: 5432
    storageSize: 8Gi
    storageClassName: ""
    dbName: lms
    username: lms
    password: lms
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  redis:
    enabled: true
    image: redis:7-alpine
    servicePort: 6379
    storageSize: 2Gi
    storageClassName: ""
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
  kafka:
    enabled: true
    image: bitnami/kafka:3.7
    servicePort: 9092
    storageSize: 10Gi
    storageClassName: ""
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: 1000m
        memory: 1536Mi
  elasticsearch:
    enabled: true
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    servicePort: 9200
    storageSize: 10Gi
    storageClassName: ""
    javaOpts: -Xms512m -Xmx512m
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  minio:
    enabled: true
    image: minio/minio:RELEASE.2026-01-14T05-07-30Z
    servicePort: 9000
    consolePort: 9001
    storageSize: 10Gi
    storageClassName: ""
    rootUser: minioadmin
    rootPassword: minioadmin
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  jaeger:
    enabled: true
    image: jaegertracing/all-in-one:1.57
    collectorOtlpGrpcPort: 4317
    collectorOtlpHttpPort: 4318
    queryPort: 16686
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

components:
  lms-gateway:
    enabled: true
    imageName: lms-gateway
    containerPort: 8080
    servicePort: 80
    serviceType: ClusterIP
    replicaCount: 2
    env:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AUTH_SERVICE_URL: http://lms-auth-service:8082
      COURSE_SERVICE_URL: http://lms-course-service:8083
      ENROLLMENT_SERVICE_URL: http://lms-enrollment-service:8084
      CONTENT_SERVICE_URL: http://lms-content-service:8085
      ASSIGNMENT_SERVICE_URL: http://lms-assignment-service:8087
      SEARCH_SERVICE_URL: http://lms-search-service:8086
      NOTIFICATION_SERVICE_URL: http://lms-notification-service:8088
      PAYMENT_SERVICE_URL: http://lms-payment-service:8089
      ANALYTICS_SERVICE_URL: http://lms-analytics-service:8090
      USER_SERVICE_URL: http://lms-user-service:8081
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      minAvailable: 1

  lms-auth-service:
    enabled: true
    imageName: lms-auth-service
    containerPort: 8082
    servicePort: 8082
    serviceType: ClusterIP
    replicaCount: 2
    env:
      SPRING_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USER_SERVICE_URL: http://lms-user-service:8081
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    hpa:
      enabled: true
