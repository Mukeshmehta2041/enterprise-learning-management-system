global:
  imageTag: latest
  imagePullSecrets:
    - name: ghcr-secret

ingress:
  enabled: true
  className: nginx
  host: staging.lms.example.com
  tls:
    enabled: false
    secretName: ""

config:
  SPRING_PROFILES_ACTIVE: k8s-staging
  CORS_ALLOWED_ORIGINS: https://staging.lms.example.com

externalSecrets:
  enabled: true
  secretStoreRef:
    name: lms-staging-secret-store
    kind: ClusterSecretStore
  data:
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteKey: /lms/staging/common
      property: SPRING_DATASOURCE_USERNAME
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteKey: /lms/staging/common
      property: SPRING_DATASOURCE_PASSWORD
    - secretKey: JWT_SECRET
      remoteKey: /lms/staging/common
      property: JWT_SECRET
    - secretKey: LMS_STORAGE_ACCESS_KEY
      remoteKey: /lms/staging/common
      property: LMS_STORAGE_ACCESS_KEY
    - secretKey: LMS_STORAGE_SECRET_KEY
      remoteKey: /lms/staging/common
      property: LMS_STORAGE_SECRET_KEY
    - secretKey: MAILTRAP_USERNAME
      remoteKey: /lms/staging/common
      property: MAILTRAP_USERNAME
    - secretKey: MAILTRAP_PASSWORD
      remoteKey: /lms/staging/common
      property: MAILTRAP_PASSWORD

secrets:
  SPRING_DATASOURCE_USERNAME: lmsuser
  SPRING_DATASOURCE_PASSWORD: postgres-secure-password-2026
  JWT_SECRET: staging-jwt-secret-change-me
  LMS_STORAGE_ACCESS_KEY: minioadmin
  LMS_STORAGE_SECRET_KEY: minioadmin
  MAILTRAP_USERNAME: ""
  MAILTRAP_PASSWORD: ""

dependencies:
  postgres:
    dbName: lms_db
    username: lmsuser
    password: postgres-secure-password-2026
    storageSize: 20Gi
    storageClassName: do-block-storage
  redis:
    storageSize: 5Gi
    storageClassName: do-block-storage
  kafka:
    storageSize: 10Gi
    storageClassName: do-block-storage
  elasticsearch:
    storageSize: 20Gi
    storageClassName: do-block-storage
  minio:
    storageSize: 20Gi
    storageClassName: do-block-storage

components:
  lms-gateway:
    replicaCount: 2
  lms-auth-service:
    replicaCount: 2
  lms-course-service:
    replicaCount: 2
  lms-enrollment-service:
    replicaCount: 2
  lms-content-service:
    replicaCount: 2
  lms-assignment-service:
    replicaCount: 2
  lms-search-service:
    replicaCount: 2
  lms-notification-service:
    replicaCount: 2
  lms-payment-service:
    replicaCount: 2
  lms-analytics-service:
    replicaCount: 2

frontend:
  enabled: true
  ingress:
    enabled: true
    className: nginx
    host: staging-app.lms.example.com
    tls:
      enabled: false
      secretName: ""
