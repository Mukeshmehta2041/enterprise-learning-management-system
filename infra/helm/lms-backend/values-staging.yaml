global:
  imageTag: latest
  # Image pull credentials for DigitalOcean Kubernetes
  imagePullSecrets:
    - name: ghcr-secret
  # Resource requests appropriate for 3x $6/month DO nodes (12GB total RAM)
  resources:
    limits:
      memory: "1Gi"
      cpu: "500m"
    requests:
      memory: "512Mi"
      cpu: "250m"
  # Storage configuration for DigitalOcean Block Storage
  persistence:
    enabled: true
    storageClassName: do-block-storage
    size: 20Gi

components:
  lms-gateway:
    replicaCount: 2
  lms-auth-service:
    replicaCount: 2
  lms-course-service:
    replicaCount: 2
  lms-enrollment-service:
    replicaCount: 2
  lms-content-service:
    replicaCount: 2
  lms-assignment-service:
    replicaCount: 2
  lms-search-service:
    replicaCount: 2
  lms-notification-service:
    replicaCount: 2
  lms-payment-service:
    replicaCount: 2
  lms-analytics-service:
    replicaCount: 2

# Database and Cache Configuration
database:
  host: postgres
  port: 5432
  name: lms_db
  username: lmsuser
  password: "postgres-secure-password-2026"

redis:
  host: redis
  port: 6379
  password: "redis-secure-password-2026"

# Common environment variables for all services
commonEnv:
  - name: SPRING_PROFILE_ACTIVE
    value: "k8s"
  - name: SPRING_DATASOURCE_URL
    value: "jdbc:postgresql://postgres:5432/lms_db"
  - name: SPRING_DATASOURCE_USERNAME
    value: "lmsuser"
  - name: SPRING_DATASOURCE_PASSWORD
    value: "postgres-secure-password-2026"
  - name: SPRING_REDIS_HOST
    value: "redis"
  - name: SPRING_REDIS_PORT
    value: "6379"
  - name: SPRING_REDIS_PASSWORD
    value: "redis-secure-password-2026"
  - name: JWT_SECRET_KEY
    value: "your-super-secret-jwt-key-at-least-256-bits-long-to-ensure-security-and-compliance-with-jwt-standards"
  - name: JAVA_OPTS
    value: "-Xmx512m -Xms256m"
