{{- if .Values.dependencies.elasticsearch.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-data
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.dependencies.elasticsearch.storageClassName }}
  storageClassName: {{ .Values.dependencies.elasticsearch.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.dependencies.elasticsearch.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: {{ .Values.dependencies.elasticsearch.image }}
          ports:
            - containerPort: 9200
          resources:
            {{- toYaml .Values.dependencies.elasticsearch.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 9200
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /
              port: 9200
            failureThreshold: 30
            periodSeconds: 10
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: {{ .Values.dependencies.elasticsearch.javaOpts | quote }}
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: elasticsearch-data
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
spec:
  selector:
    app: elasticsearch
  ports:
    - port: {{ .Values.dependencies.elasticsearch.servicePort }}
      targetPort: 9200
      protocol: TCP
{{- if .Values.dependencies.elasticsearch.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: elasticsearch
spec:
  minAvailable: {{ .Values.dependencies.elasticsearch.pdb.minAvailable }}
  selector:
    matchLabels:
      app: elasticsearch
