      storage: {{ .Values.dependencies.minio.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.dependencies.minio.image }}
          args:
            - server
            - /data
            - --console-address
            - :9001
          ports:
