{{- if .Values.dependencies.postgres.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.dependencies.postgres.storageClassName }}
  storageClassName: {{ .Values.dependencies.postgres.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.dependencies.postgres.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.dependencies.postgres.image }}
          ports:
            - containerPort: 5432
          resources:
            {{- toYaml .Values.dependencies.postgres.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.dependencies.postgres.username }} -d {{ .Values.dependencies.postgres.dbName }}"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.dependencies.postgres.username }} -d {{ .Values.dependencies.postgres.dbName }}"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          env:
            - name: POSTGRES_DB
              value: {{ .Values.dependencies.postgres.dbName | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.dependencies.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.dependencies.postgres.password | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: {{ .Values.dependencies.postgres.servicePort }}
      targetPort: 5432
      protocol: TCP
{{- if .Values.dependencies.postgres.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres
spec:
  minAvailable: {{ .Values.dependencies.postgres.pdb.minAvailable }}
  selector:
    matchLabels:
      app: postgres
{{- end }}
{{- if .Values.dependencies.postgres.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-namespace
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- end }}

