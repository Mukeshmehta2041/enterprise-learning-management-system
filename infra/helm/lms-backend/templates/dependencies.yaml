{{- if .Values.dependencies.jaeger.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: {{ .Values.dependencies.jaeger.image }}
          ports:
            - containerPort: {{ .Values.dependencies.jaeger.collectorOtlpGrpcPort }}
            - containerPort: {{ .Values.dependencies.jaeger.collectorOtlpHttpPort }}
            - containerPort: {{ .Values.dependencies.jaeger.queryPort }}
          resources:
            {{- toYaml .Values.dependencies.jaeger.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.dependencies.jaeger.queryPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.dependencies.jaeger.queryPort }}
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: {{ .Values.dependencies.jaeger.collectorOtlpGrpcPort }}
      targetPort: {{ .Values.dependencies.jaeger.collectorOtlpGrpcPort }}
      protocol: TCP
    - name: otlp-http
      port: {{ .Values.dependencies.jaeger.collectorOtlpHttpPort }}
      targetPort: {{ .Values.dependencies.jaeger.collectorOtlpHttpPort }}
      protocol: TCP
    - name: query
      port: {{ .Values.dependencies.jaeger.queryPort }}
      targetPort: {{ .Values.dependencies.jaeger.queryPort }}
      protocol: TCP
{{- if .Values.dependencies.jaeger.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: jaeger
spec:
  minAvailable: {{ .Values.dependencies.jaeger.pdb.minAvailable }}
  selector:
    matchLabels:
      app: jaeger
{{- end }}
{{- if .Values.dependencies.jaeger.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jaeger-allow-namespace
spec:
  podSelector:
    matchLabels:
      app: jaeger
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.dependencies.jaeger.collectorOtlpGrpcPort }}
        - protocol: TCP
          port: {{ .Values.dependencies.jaeger.collectorOtlpHttpPort }}
        - protocol: TCP
          port: {{ .Values.dependencies.jaeger.queryPort }}
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- end }}
