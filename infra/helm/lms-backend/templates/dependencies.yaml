              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.dependencies.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.dependencies.minio.rootPassword | quote }}
          volumeMounts:
            - name: data
