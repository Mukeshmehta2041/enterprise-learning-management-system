{{- if and .Values.frontend.enabled .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lms-frontend
  labels:
    app.kubernetes.io/name: lms-frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  {{- if .Values.frontend.ingress.className }}
  ingressClassName: {{ .Values.frontend.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.frontend.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lms-frontend
                port:
                  number: {{ .Values.frontend.servicePort }}
  {{- if and .Values.frontend.ingress.tls.enabled .Values.frontend.ingress.tls.secretName }}
  tls:
    - hosts:
        - {{ .Values.frontend.ingress.host | quote }}
      secretName: {{ .Values.frontend.ingress.tls.secretName }}
  {{- end }}
{{- end }}
